<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}syncd config{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <h1>syncd</h1>
    {% block daemon_badge %}
    <span id="daemon-badge" class="badge badge-unknown">checking…</span>
    {% endblock %}
  </header>

  {% block daemon_banner %}{% endblock %}

  <main>{% block content %}{% endblock %}</main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
