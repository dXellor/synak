{% extends "base.html" %}
{% block title %}syncd — config editor{% endblock %}

{% block content %}
<div class="toolbar">
  <div class="mode-toggle" role="group" aria-label="Editor mode">
    <button id="btn-raw" class="mode-btn active" data-mode="raw">Raw TOML</button>
    <button id="btn-friendly" class="mode-btn" data-mode="friendly">Friendly</button>
  </div>
  <div class="toolbar-actions">
    <span id="save-note" class="save-note">Changes apply in-memory only — lost on daemon restart.</span>
    <button id="btn-apply" class="btn-primary">Apply</button>
  </div>
</div>

<div id="flash" class="flash" style="display:none"></div>

<div id="editor-raw" class="editor-pane">
  <textarea id="raw-textarea" spellcheck="false" placeholder="Loading config…"></textarea>
</div>

<div id="editor-friendly" class="editor-pane" style="display:none">
  <div id="friendly-form"></div>
</div>
{% endblock %}
